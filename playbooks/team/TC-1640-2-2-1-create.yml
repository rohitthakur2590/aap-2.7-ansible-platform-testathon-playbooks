---
# TC-1640-2-2-1: Create Team in Organization
- name: "TC-1640-2-2-1 | Create Team"
  hosts: localhost
  gather_facts: false
  vars_files:
    - ../../vars/aap.yml
    - ../../vars/user.yml
  vars:
    org_name: "TestOrg-1640-{{ rh_username }}"
    team_name: "TestTeam-1640-{{ rh_username }}"
    aap_conn: &aap_conn
      gateway_hostname: "{{ gateway_hostname }}"
      gateway_username: "{{ gateway_username }}"
      gateway_password: "{{ gateway_password }}"
      gateway_validate_certs: "{{ gateway_validate_certs }}"
  tasks:
    - block:
        - name: "[setup] Ensure org exists"
          ansible.platform.organization:
            name: "{{ org_name }}"
            state: present
            <<: *aap_conn

        - name: "[TC-1640-2-2-1] Create team"
          ansible.platform.team:
            name: "{{ team_name }}"
            organization: "{{ org_name }}"
            state: present
            <<: *aap_conn
          register: result

        - name: Assert changed
          ansible.builtin.assert:
            that:
              - result is changed
              - result.team.name == team_name
              - result.name == team_name
            fail_msg: "Team create failed or flat/nested key missing"

        - name: "[TC-1640-2-2-1] Idempotency"
          ansible.platform.team:
            name: "{{ team_name }}"
            organization: "{{ org_name }}"
            state: present
            <<: *aap_conn
          register: idem
        - ansible.builtin.assert:
            that: idem is not changed
            fail_msg: "Team re-run not idempotent"

        - ansible.builtin.debug:
            msg: "TC-1640-2-2-1 PASSED"
      rescue:
        - ansible.builtin.fail:
            msg: "TC-1640-2-2-1 FAILED"
      always:
        - ansible.builtin.include_tasks: ../../reset/team.yml
        - ansible.builtin.include_tasks: ../../reset/org.yml
...
