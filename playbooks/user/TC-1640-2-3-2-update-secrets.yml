---
# TC-1640-2-3-3 + TC-1640-2-3-4 + TC-1640-2-3-5: Update email, update_secrets behaviour
- name: "TC-1640-2-3-2 | User — Update email and secrets behaviour"
  hosts: localhost
  gather_facts: false
  vars_files:
    - ../../vars/aap.yml
    - ../../vars/user.yml
  vars:
    user_name: "testuser-1640-{{ rh_username }}"
    user_email: "testuser-{{ rh_username }}@testathon.local"
    aap_conn: &aap_conn
      gateway_hostname: "{{ gateway_hostname }}"
      gateway_username: "{{ gateway_username }}"
      gateway_password: "{{ gateway_password }}"
      gateway_validate_certs: "{{ gateway_validate_certs }}"
  tasks:
    - block:
        - name: "[setup] Create user"
          ansible.platform.user:
            username: "{{ user_name }}"
            email: "{{ user_email }}"
            password: "TestPass123!"
            state: present
            <<: *aap_conn

        - name: "[TC-1640-2-3-3] Update email"
          ansible.platform.user:
            username: "{{ user_name }}"
            email: "updated-{{ rh_username }}@testathon.local"
            state: present
            <<: *aap_conn
          register: upd
        - ansible.builtin.assert:
            that: upd is changed
            fail_msg: "Email update not reported as changed"

        - name: "[TC-1640-2-3-4] Update password with update_secrets: true"
          ansible.platform.user:
            username: "{{ user_name }}"
            email: "updated-{{ rh_username }}@testathon.local"
            password: "NewPass456!"
            update_secrets: true
            state: present
            <<: *aap_conn
          register: pwd_upd
        - ansible.builtin.assert:
            that: pwd_upd is changed
            fail_msg: "Password update with update_secrets=true not reported as changed"

        - name: "[TC-1640-2-3-5] update_secrets: false — should NOT re-push password"
          ansible.platform.user:
            username: "{{ user_name }}"
            email: "updated-{{ rh_username }}@testathon.local"
            password: "AnyValue"
            update_secrets: false
            state: present
            <<: *aap_conn
          register: no_secret
        - ansible.builtin.assert:
            that: no_secret is not changed
            fail_msg: "update_secrets=false reported changed when nothing else changed"

        - ansible.builtin.debug:
            msg: "TC-1640-2-3-3/4/5 PASSED"
      rescue:
        - ansible.builtin.fail:
            msg: "TC-1640-2-3-2 FAILED"
      always:
        - ansible.builtin.include_tasks: ../../reset/user.yml
...
