---
- name: "[reset] Delete test role definition"
  ansible.platform.role_definition:
    name: "{{ role_name }}"
    permissions:
      - "shared.view_organization"
    content_type: "shared.organization"
    state: absent
    gateway_hostname: "{{ gateway_hostname }}"
    gateway_username: "{{ gateway_username }}"
    gateway_password: "{{ gateway_password }}"
    gateway_validate_certs: "{{ gateway_validate_certs }}"
  register: _r
  failed_when: _r.failed and 'Not Found' not in (_r.msg | default(''))
