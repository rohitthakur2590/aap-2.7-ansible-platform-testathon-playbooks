---
# TC-1640-2-2-3 + TC-1640-2-2-4: Team update description + delete
- name: "TC-1640-2-2-2 | Team — Update & Delete"
  hosts: localhost
  gather_facts: false
  vars_files:
    - ../../vars/aap.yml
    - ../../vars/user.yml
  vars:
    org_name: "TestOrg-1640-{{ rh_username }}"
    team_name: "TestTeam-1640-{{ rh_username }}"
    aap_conn: &aap_conn
      gateway_hostname: "{{ gateway_hostname }}"
      gateway_username: "{{ gateway_username }}"
      gateway_password: "{{ gateway_password }}"
      gateway_validate_certs: "{{ gateway_validate_certs }}"
  tasks:
    - block:
        - name: "[setup] Create org and team"
          ansible.platform.organization:
            name: "{{ org_name }}"
            state: present
            <<: *aap_conn
        - ansible.platform.team:
            name: "{{ team_name }}"
            organization: "{{ org_name }}"
            state: present
            <<: *aap_conn

        - name: "[TC-1640-2-2-3] Update description"
          ansible.platform.team:
            name: "{{ team_name }}"
            organization: "{{ org_name }}"
            description: "Updated team description"
            state: present
            <<: *aap_conn
          register: upd
        - ansible.builtin.assert:
            that: upd is changed
            fail_msg: "Team description update did not report changed"

        - name: "[TC-1640-2-2-4] Delete team"
          ansible.platform.team:
            name: "{{ team_name }}"
            organization: "{{ org_name }}"
            state: absent
            <<: *aap_conn
          register: del
        - ansible.builtin.assert:
            that: del is changed
            fail_msg: "Team delete did not report changed"

        - name: "[TC-1640-2-2-4] Delete idempotency"
          ansible.platform.team:
            name: "{{ team_name }}"
            organization: "{{ org_name }}"
            state: absent
            <<: *aap_conn
          register: del2
        - ansible.builtin.assert:
            that: del2 is not changed
            fail_msg: "Team delete re-run not idempotent"

        - ansible.builtin.debug:
            msg: "TC-1640-2-2-3 and TC-1640-2-2-4 PASSED"
      rescue:
        - ansible.builtin.fail:
            msg: "TC-1640-2-2-3/4 FAILED"
      always:
        - ansible.builtin.include_tasks: ../../reset/team.yml
        - ansible.builtin.include_tasks: ../../reset/org.yml
...
