---
# TC-1640-2-4-3: Update description + TC-1640-2-4-4: Delete
- name: "TC-1640-2-4-2 | Role Definition — Update & Delete"
  hosts: localhost
  gather_facts: false
  vars_files:
    - ../../vars/aap.yml
    - ../../vars/user.yml
  vars:
    role_name: "TestRole-1640-{{ rh_username }}"
    aap_conn: &aap_conn
      aap_hostname: "{{ aap_hostname }}"
      aap_username: "{{ aap_username }}"
      aap_password: "{{ aap_password }}"
      aap_validate_certs: "{{ aap_validate_certs }}"
  tasks:
    - block:
        - name: "[setup] Create role definition"
          ansible.platform.role_definition:
            name: "{{ role_name }}"
            content_type: "shared.organization"
            permissions:
              - "shared.view_organization"
            state: present
            <<: *aap_conn

        - name: "[TC-1640-2-4-3] Update description"
          ansible.platform.role_definition:
            name: "{{ role_name }}"
            description: "Updated description"
            content_type: "shared.organization"
            permissions:
              - "shared.view_organization"
            state: present
            <<: *aap_conn
          register: upd
        - ansible.builtin.assert:
            that: upd is changed
            fail_msg: "Description update not reported as changed"

        - name: "[TC-1640-2-4-4] Delete role definition"
          ansible.platform.role_definition:
            name: "{{ role_name }}"
            content_type: "shared.organization"
            permissions:
              - "shared.view_organization"
            state: absent
            <<: *aap_conn
          register: del
        - ansible.builtin.assert:
            that: del is changed
            fail_msg: "Delete not reported as changed"

        - ansible.builtin.debug:
            msg: "TC-1640-2-4-3 and TC-1640-2-4-4 PASSED"
      rescue:
        - ansible.builtin.fail:
            msg: "TC-1640-2-4-2 FAILED"
      always:
        - ansible.builtin.include_tasks: ../../reset/role_definition.yml
...
