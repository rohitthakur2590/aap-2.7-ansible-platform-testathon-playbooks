---
# clean_all.yml — Removes ALL test resources created by the testathon playbooks.
# Safe to run any time; uses failed_when to tolerate already-absent resources.
#
# Usage:
#   ansible-playbook clean_all.yml
#
- name: Clean all testathon resources
  hosts: localhost
  gather_facts: false
  vars_files:
    - vars/aap.yml
    - vars/user.yml

  vars:
    org_name: "TestOrg-1640-{{ rh_username }}"
    org_name_b: "TestOrg-1640-B-{{ rh_username }}"
    team_name: "TestTeam-1640-{{ rh_username }}"
    user_name: "testuser-1640-{{ rh_username }}"
    role_name: "TestRole-1640-{{ rh_username }}"
    app_name: "TestApp-1640-{{ rh_username }}"
    auth_name: "TestAuth-1640-{{ rh_username }}"
    auth_slug: "testauth-1640-{{ rh_username }}"

  tasks:
    - name: "[cleanup] Delete role user assignments (best-effort)"
      ansible.platform.role_user_assignment:
        role_definition: "{{ role_name }}"
        user: "{{ user_name }}"
        object_ids:
          - "{{ org_name }}"
        state: absent
        aap_hostname: "{{ aap_hostname }}"
        aap_username: "{{ aap_username }}"
        aap_password: "{{ aap_password }}"
        aap_validate_certs: "{{ aap_validate_certs }}"
      register: _r
      failed_when: _r.failed and 'Not Found' not in (_r.msg | default(''))

    - name: "[cleanup] Delete role team assignments (best-effort)"
      ansible.platform.role_team_assignment:
        role_definition: "{{ role_name }}"
        team: "{{ team_name }}"
        assignment_objects:
          - name: "{{ org_name }}"
            type: "organizations"
        state: absent
        aap_hostname: "{{ aap_hostname }}"
        aap_username: "{{ aap_username }}"
        aap_password: "{{ aap_password }}"
        aap_validate_certs: "{{ aap_validate_certs }}"
      register: _r
      failed_when: _r.failed and 'Not Found' not in (_r.msg | default(''))

    - name: "[cleanup] Delete role definition"
      ansible.platform.role_definition:
        name: "{{ role_name }}"
        permissions:
          - "shared.view_organization"
        content_type: "shared.organization"
        state: absent
        aap_hostname: "{{ aap_hostname }}"
        aap_username: "{{ aap_username }}"
        aap_password: "{{ aap_password }}"
        aap_validate_certs: "{{ aap_validate_certs }}"
      register: _r
      failed_when: _r.failed and 'Not Found' not in (_r.msg | default(''))

    - name: "[cleanup] Delete application"
      ansible.platform.application:
        name: "{{ app_name }}"
        organization: "{{ org_name }}"
        state: absent
        aap_hostname: "{{ aap_hostname }}"
        aap_username: "{{ aap_username }}"
        aap_password: "{{ aap_password }}"
        aap_validate_certs: "{{ aap_validate_certs }}"
      register: _r
      failed_when: _r.failed and 'Not Found' not in (_r.msg | default(''))

    - name: "[cleanup] Delete authenticator"
      ansible.platform.authenticator:
        name: "{{ auth_name }}"
        slug: "{{ auth_slug }}"
        type: "ansible_base.authentication.authenticator_plugins.local"
        configuration: {}
        state: absent
        aap_hostname: "{{ aap_hostname }}"
        aap_username: "{{ aap_username }}"
        aap_password: "{{ aap_password }}"
        aap_validate_certs: "{{ aap_validate_certs }}"
      register: _r
      failed_when: _r.failed and 'Not Found' not in (_r.msg | default(''))

    - name: "[cleanup] Delete user"
      ansible.platform.user:
        username: "{{ user_name }}"
        state: absent
        aap_hostname: "{{ aap_hostname }}"
        aap_username: "{{ aap_username }}"
        aap_password: "{{ aap_password }}"
        aap_validate_certs: "{{ aap_validate_certs }}"
      register: _r
      failed_when: _r.failed and 'Not Found' not in (_r.msg | default(''))

    - name: "[cleanup] Delete team"
      ansible.platform.team:
        name: "{{ team_name }}"
        organization: "{{ org_name }}"
        state: absent
        aap_hostname: "{{ aap_hostname }}"
        aap_username: "{{ aap_username }}"
        aap_password: "{{ aap_password }}"
        aap_validate_certs: "{{ aap_validate_certs }}"
      register: _r
      failed_when: _r.failed and 'Not Found' not in (_r.msg | default(''))

    - name: "[cleanup] Delete organizations"
      ansible.platform.organization:
        name: "{{ item }}"
        state: absent
        aap_hostname: "{{ aap_hostname }}"
        aap_username: "{{ aap_username }}"
        aap_password: "{{ aap_password }}"
        aap_validate_certs: "{{ aap_validate_certs }}"
      loop:
        - "{{ org_name }}"
        - "{{ org_name_b }}"
      register: _r
      failed_when: _r.failed and 'Not Found' not in (_r.msg | default(''))

    - name: Summary
      ansible.builtin.debug:
        msg: "All testathon resources cleaned up for user: {{ rh_username }}"
...
