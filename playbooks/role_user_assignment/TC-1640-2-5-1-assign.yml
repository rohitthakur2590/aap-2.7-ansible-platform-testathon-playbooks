---
# TC-1640-2-5-1: Assign user to org with role + idempotency
# TC-1640-2-5-3: Multi-object assignment
# TC-1640-2-5-4: Remove assignment
- name: "TC-1640-2-5-1 | Role User Assignment — Lifecycle"
  hosts: localhost
  gather_facts: false
  vars_files:
    - ../../vars/aap.yml
    - ../../vars/user.yml
  vars:
    org_name: "TestOrg-1640-{{ rh_username }}"
    org_name_b: "TestOrg-1640-B-{{ rh_username }}"
    user_name: "testuser-1640-{{ rh_username }}"
    role_name: "TestRole-1640-{{ rh_username }}"
    aap_conn: &aap_conn
      gateway_hostname: "{{ gateway_hostname }}"
      gateway_username: "{{ gateway_username }}"
      gateway_password: "{{ gateway_password }}"
      gateway_validate_certs: "{{ gateway_validate_certs }}"
  tasks:
    - block:
        - name: "[setup] Create orgs, user, and role"
          ansible.platform.organization:
            name: "{{ item }}"
            state: present
            <<: *aap_conn
          loop:
            - "{{ org_name }}"
            - "{{ org_name_b }}"

        - ansible.platform.user:
            username: "{{ user_name }}"
            email: "testuser-{{ rh_username }}@testathon.local"
            password: "TestPass123!"
            state: present
            <<: *aap_conn

        - ansible.platform.role_definition:
            name: "{{ role_name }}"
            content_type: "shared.organization"
            permissions:
              - "shared.view_organization"
            state: present
            <<: *aap_conn

        - name: "[TC-1640-2-5-1] Assign user to org"
          ansible.platform.role_user_assignment:
            role_definition: "{{ role_name }}"
            user: "{{ user_name }}"
            object_ids:
              - "{{ org_name }}"
            state: present
            <<: *aap_conn
          register: result
        - ansible.builtin.assert:
            that: result is changed
            fail_msg: "Role user assignment not reported as changed"

        - name: "[TC-1640-2-5-2] Idempotency"
          ansible.platform.role_user_assignment:
            role_definition: "{{ role_name }}"
            user: "{{ user_name }}"
            object_ids:
              - "{{ org_name }}"
            state: present
            <<: *aap_conn
          register: idem
        - ansible.builtin.assert:
            that: idem is not changed
            fail_msg: "Role user assignment re-run not idempotent"

        - name: "[TC-1640-2-5-3] Multi-object assignment"
          ansible.platform.role_user_assignment:
            role_definition: "{{ role_name }}"
            user: "{{ user_name }}"
            object_ids:
              - "{{ org_name }}"
              - "{{ org_name_b }}"
            state: present
            <<: *aap_conn
          register: multi
        - ansible.builtin.assert:
            that: multi is changed
            fail_msg: "Multi-object assignment not reported as changed"

        - name: "[TC-1640-2-5-4] Remove assignment"
          ansible.platform.role_user_assignment:
            role_definition: "{{ role_name }}"
            user: "{{ user_name }}"
            object_ids:
              - "{{ org_name }}"
            state: absent
            <<: *aap_conn
          register: del
        - ansible.builtin.assert:
            that: del is changed
            fail_msg: "Assignment delete not reported as changed"

        - ansible.builtin.debug:
            msg: "TC-1640-2-5-1 through TC-1640-2-5-4 PASSED"
      rescue:
        - ansible.builtin.fail:
            msg: "TC-1640-2-5-1 FAILED"
      always:
        - ansible.builtin.include_tasks: ../../reset/role_definition.yml
        - ansible.builtin.include_tasks: ../../reset/user.yml
        - ansible.platform.organization:
            name: "{{ item }}"
            state: absent
            <<: *aap_conn
          loop:
            - "{{ org_name }}"
            - "{{ org_name_b }}"
          register: _r
          failed_when: _r.failed and 'Not Found' not in (_r.msg | default(''))
...
