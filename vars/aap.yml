---
# AAP connection settings.
#
# NOTE: These vars are still consumed by playbooks via vars_files for local-mode
# module params (gateway_hostname, gateway_username, etc.).
# The canonical place to set them is group_vars/all.yml — keep the values in sync.
#
# If you run playbooks via the AAP GUI (Job Templates), pass these as Extra Variables
# on the template rather than editing this file.

gateway_hostname: "https://<gateway>/"
gateway_username: "*****"
gateway_password: "*************"
gateway_validate_certs: false
gateway_request_timeout: 60
