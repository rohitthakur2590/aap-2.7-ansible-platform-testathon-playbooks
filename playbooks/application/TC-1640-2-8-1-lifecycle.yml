---
# TC-1640-2-8-1/2/3: Application create, idempotency, delete
- name: "TC-1640-2-8-1 | Application — Lifecycle"
  hosts: localhost
  gather_facts: false
  vars_files:
    - ../../vars/aap.yml
    - ../../vars/user.yml
  vars:
    org_name: "TestOrg-1640-{{ rh_username }}"
    app_name: "TestApp-1640-{{ rh_username }}"
    aap_conn: &aap_conn
      gateway_hostname: "{{ gateway_hostname }}"
      gateway_username: "{{ gateway_username }}"
      gateway_password: "{{ gateway_password }}"
      gateway_validate_certs: "{{ gateway_validate_certs }}"
  tasks:
    - block:
        - name: "[setup] Ensure org exists"
          ansible.platform.organization:
            name: "{{ org_name }}"
            state: present
            <<: *aap_conn

        - name: "[TC-1640-2-8-1] Create application"
          ansible.platform.application:
            name: "{{ app_name }}"
            organization: "{{ org_name }}"
            authorization_grant_type: "authorization-code"
            client_type: "confidential"
            redirect_uris: "https://testathon.local/callback"
            state: present
            <<: *aap_conn
          register: result

        - name: Assert changed and keys present
          ansible.builtin.assert:
            that:
              - result is changed
              - result.application.name == app_name
              - result.name == app_name
            fail_msg: "Application create failed or keys missing"

        - name: "[TC-1640-2-8-2] Idempotency"
          ansible.platform.application:
            name: "{{ app_name }}"
            organization: "{{ org_name }}"
            authorization_grant_type: "authorization-code"
            client_type: "confidential"
            redirect_uris: "https://testathon.local/callback"
            state: present
            <<: *aap_conn
          register: idem
        - ansible.builtin.assert:
            that: idem is not changed
            fail_msg: "Application re-run not idempotent"

        - name: "[TC-1640-2-8-3] Delete application"
          ansible.platform.application:
            name: "{{ app_name }}"
            organization: "{{ org_name }}"
            state: absent
            <<: *aap_conn
          register: deleted
        - ansible.builtin.assert:
            that: deleted is changed
            fail_msg: "Application delete not reported as changed"

        - ansible.builtin.debug:
            msg: "TC-1640-2-8-1/2/3 PASSED"
      rescue:
        - ansible.builtin.fail:
            msg: "TC-1640-2-8-1 FAILED"
      always:
        - ansible.builtin.include_tasks: ../../reset/application.yml
        - ansible.builtin.include_tasks: ../../reset/org.yml
...
