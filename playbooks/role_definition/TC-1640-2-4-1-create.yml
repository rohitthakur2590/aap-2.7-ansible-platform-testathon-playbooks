---
# TC-1640-2-4-1: Create Role Definition with specific permissions
- name: "TC-1640-2-4-1 | Create Role Definition"
  hosts: localhost
  gather_facts: false
  vars_files:
    - ../../vars/aap.yml
    - ../../vars/user.yml
  vars:
    role_name: "TestRole-1640-{{ rh_username }}"
    aap_conn: &aap_conn
      gateway_hostname: "{{ gateway_hostname }}"
      gateway_username: "{{ gateway_username }}"
      gateway_password: "{{ gateway_password }}"
      gateway_validate_certs: "{{ gateway_validate_certs }}"
  tasks:
    - block:
        - name: "[TC-1640-2-4-1] Create role definition"
          ansible.platform.role_definition:
            name: "{{ role_name }}"
            description: "Testathon custom role for {{ rh_username }}"
            content_type: "shared.organization"
            permissions:
              - "shared.view_organization"
            state: present
            <<: *aap_conn
          register: result

        - name: Assert changed
          ansible.builtin.assert:
            that:
              - result is changed
              - result.role_definition.name == role_name
            fail_msg: "Role definition create failed or result.role_definition.name missing"

        - name: Assert 2.6 flat key — result.name
          ansible.builtin.assert:
            that:
              - result.name is defined
              - result.name == role_name
            fail_msg: "REGRESSION: result.name flat key missing for role_definition"

        - name: "[TC-1640-2-4-2] Idempotency"
          ansible.platform.role_definition:
            name: "{{ role_name }}"
            description: "Testathon custom role for {{ rh_username }}"
            content_type: "shared.organization"
            permissions:
              - "shared.view_organization"
            state: present
            <<: *aap_conn
          register: idem
        - ansible.builtin.assert:
            that: idem is not changed
            fail_msg: "Role definition re-run not idempotent"

        - ansible.builtin.debug:
            msg: "TC-1640-2-4-1 and TC-1640-2-4-2 PASSED"
      rescue:
        - ansible.builtin.fail:
            msg: "TC-1640-2-4-1 FAILED"
      always:
        - ansible.builtin.include_tasks: ../../reset/role_definition.yml
...
