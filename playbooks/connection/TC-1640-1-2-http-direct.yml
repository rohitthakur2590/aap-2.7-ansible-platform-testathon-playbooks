---
# TC-1640-1-2: Connection mode — http-direct
# Each task opens a new HTTP session to the Gateway. No persistent manager.
#
# Run: ansible-playbook playbooks/connection/TC-1640-1-2-http-direct.yml
#
- name: "TC-1640-1-2 | Connection: http-direct — user lifecycle"
  hosts: localhost
  gather_facts: false
  vars_files:
    - ../../vars/aap.yml
    - ../../vars/user.yml

  vars:
    ansible_connection: "ansible.platform.http"
    ansible_platform_use_persistent_connection: false
    test_username: "tc1640-direct-{{ rh_username }}"
    test_email: "tc1640-direct-{{ rh_username }}@testathon.local"
    aap_conn: &aap_conn
      aap_hostname: "{{ aap_hostname }}"
      aap_username: "{{ aap_username }}"
      aap_password: "{{ aap_password }}"
      aap_validate_certs: "{{ aap_validate_certs }}"

  tasks:
    - block:
        - name: "[TC-1640-1-2] Create user (http-direct)"
          ansible.platform.user:
            username: "{{ test_username }}"
            email: "{{ test_email }}"
            password: "TestPass123!"
            state: present
            <<: *aap_conn
          register: create_result

        - name: Assert create changed and result structure intact
          ansible.builtin.assert:
            that:
              - create_result is changed
              - create_result.user.username == test_username
            fail_msg: "User creation failed in http-direct mode (TC-1640-1-2)"

        - name: "[TC-1640-1-2] Idempotency re-run"
          ansible.platform.user:
            username: "{{ test_username }}"
            email: "{{ test_email }}"
            password: "TestPass123!"
            state: present
            <<: *aap_conn
          register: idem_result

        - name: Assert idempotent
          ansible.builtin.assert:
            that:
              - idem_result is not changed
            fail_msg: "User re-run not idempotent in http-direct mode (TC-1640-1-2)"

        - name: "[TC-1640-1-2] PASS"
          ansible.builtin.debug:
            msg: "TC-1640-1-2 PASSED — http-direct mode lifecycle verified"

      rescue:
        - name: "[TC-1640-1-2] FAIL"
          ansible.builtin.fail:
            msg: "TC-1640-1-2 FAILED — see above errors"

      always:
        - name: "[cleanup] Delete user"
          ansible.platform.user:
            username: "{{ test_username }}"
            state: absent
            <<: *aap_conn
          register: _r
          failed_when: _r.failed and 'Not Found' not in (_r.msg | default(''))
...
