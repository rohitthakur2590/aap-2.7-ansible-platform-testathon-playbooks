---
# TC-1640-3-5: Deprecated parameter warning
# Verifies that using deprecated 2.6 param still works but emits a deprecation warning
# with the correct sunset date.
#
# KNOWN GAP (as of testathon 2026-04-22):
#   object_id is documented as deprecated in role_user_assignment DOCUMENTATION,
#   BUT the action plugin (plugins/action/role_user_assignment.py) does NOT define
#   _DEPRECATED_FIELDS for it, so base_action.py's warning loop never fires.
#
#   Result: rua.deprecations is empty [] — task succeeds but no runtime warning.
#
#   Fix needed in the action plugin:
#     In run(), before calling _run_standard(), add:
#       if validated_params.get("object_id") is not None:
#           result.setdefault("deprecations", []).append({
#               "msg": "The 'object_id' parameter is deprecated. Use 'object_ids' instead.",
#               "version": "2026-05-20",
#               "collection_name": "ansible.platform"
#           })
#
# TC-3-5-A: Task must still SUCCEED using deprecated object_id param [EXPECTED: PASS]
# TC-3-5-B: Runtime deprecation warning SHOULD be emitted    [EXPECTED: FAIL — gap]
#
# Run: ansible-playbook playbooks/backward_compat/TC-1640-3-5-deprecated-params.yml
#
- name: "TC-1640-3-5 | Deprecated Params — Warning Issued, Task Still Succeeds"
  hosts: localhost
  gather_facts: false
  vars_files:
    - ../../vars/aap.yml
    - ../../vars/user.yml

  vars:
    org_name: "TestOrg-BC2-1640-{{ rh_username }}"
    user_name: "testuser-bc2-1640-{{ rh_username }}"
    role_name: "TestRole-BC-1640-{{ rh_username }}"
    aap_conn: &aap_conn
      gateway_hostname: "{{ gateway_hostname }}"
      gateway_username: "{{ gateway_username }}"
      gateway_password: "{{ gateway_password }}"
      gateway_validate_certs: "{{ gateway_validate_certs }}"

  tasks:
    - block:
        - name: "[setup] Create org, user, role"
          ansible.platform.organization:
            name: "{{ org_name }}"
            state: present
            <<: *aap_conn

        - ansible.platform.user:
            username: "{{ user_name }}"
            email: "bc2-{{ rh_username }}@testathon.local"
            password: "TestPass123!"
            state: present
            <<: *aap_conn
          register: usr

        - ansible.platform.role_definition:
            name: "{{ role_name }}"
            content_type: "shared.organization"
            permissions:
              - "shared.view_organization"
            state: present
            <<: *aap_conn
          register: role

        # ── TC-3-5-A: task must succeed with deprecated object_id ─────────────
        - name: "[TC-1640-3-5-A] Use deprecated object_id (singular) param"
          ansible.platform.role_user_assignment:
            role_definition: "{{ role_name }}"
            user: "{{ user_name }}"
            object_id: "{{ usr.id }}"
            state: present
            <<: *aap_conn
          register: rua

        - name: "[TC-3-5-A] Assert task succeeded despite deprecated param"
          ansible.builtin.assert:
            that:
              - rua is not failed
              - rua is changed
            fail_msg: "Task failed when using deprecated object_id param — REGRESSION"

        # ── TC-3-5-B: runtime deprecation warning ─────────────────────────────
        # KNOWN GAP: role_user_assignment action plugin does not define
        # _DEPRECATED_FIELDS for object_id, so no warning is appended to
        # result["deprecations"]. The deprecation is docs-only at this point.
        # Recorded as a bug — do NOT block the testathon on this assertion.
        - name: "[TC-3-5-B] Check for runtime deprecation warning (currently NOT emitted — known gap)"
          ansible.builtin.debug:
            msg: >
              TC-3-5-B GAP: rua.deprecations={{ rua.deprecations | default([]) }}.
              Expected at least one entry with sunset date 2026-05-20.
              The 'object_id' param deprecation is docs-only; the action plugin does
              not yet emit a runtime warning via _DEPRECATED_FIELDS. Bug to fix:
              add _DEPRECATED_FIELDS to plugins/action/role_user_assignment.py.

        - name: "[TC-3-5-B] Assert deprecation warning — will FAIL until gap is fixed"
          ansible.builtin.assert:
            that:
              - rua.deprecations is defined
              - rua.deprecations | length > 0
            fail_msg: >
              TC-3-5-B FAIL (known gap): No runtime deprecation warning for object_id.
              Expected rua.deprecations to contain an entry with sunset 2026-05-20.
              Fix: add _DEPRECATED_FIELDS to plugins/action/role_user_assignment.py.
          ignore_errors: true   # soft-fail: gap is tracked, don't block TC-3-5-A result

        - name: "[TC-1640-3-5] PASS (TC-3-5-A succeeded; TC-3-5-B is a known gap)"
          ansible.builtin.debug:
            msg: >
              TC-1640-3-5-A PASSED — deprecated object_id param accepted, task succeeded.
              TC-1640-3-5-B GAP   — runtime deprecation warning not emitted (docs-only).

      rescue:
        - name: "[TC-1640-3-5] FAIL"
          ansible.builtin.fail:
            msg: "TC-1640-3-5 FAILED — task itself failed using deprecated object_id param"

      always:
        - ansible.platform.role_definition:
            name: "{{ role_name }}"
            content_type: "shared.organization"
            permissions:
              - "shared.view_organization"
            state: absent
            <<: *aap_conn
          register: _r
          failed_when: _r.failed and 'Not Found' not in (_r.msg | default(''))
        - ansible.platform.user:
            username: "{{ user_name }}"
            state: absent
            <<: *aap_conn
          register: _r
          failed_when: _r.failed and 'Not Found' not in (_r.msg | default(''))
        - ansible.platform.organization:
            name: "{{ org_name }}"
            state: absent
            <<: *aap_conn
          register: _r
          failed_when: _r.failed and 'Not Found' not in (_r.msg | default(''))
...
