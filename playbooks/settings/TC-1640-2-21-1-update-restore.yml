---
# TC-1640-2-21-1: Read, update, and restore a gateway setting
# Uses SESSION_COOKIE_AGE as a safe test setting.
# Reads the current value first so the test is not tied to any assumed default.
- name: "TC-1640-2-21-1 | Settings — Update and Restore"
  hosts: localhost
  gather_facts: false
  vars_files:
    - ../../vars/aap.yml
    - ../../vars/user.yml
  vars:
    test_setting: "SESSION_COOKIE_AGE"
    new_value: 3600
    aap_conn: &aap_conn
      gateway_hostname: "{{ gateway_hostname }}"
      gateway_username: "{{ gateway_username }}"
      gateway_password: "{{ gateway_password }}"
      gateway_validate_certs: "{{ gateway_validate_certs }}"
  tasks:
    - block:
        - name: "[TC-1640-2-21-1] Read current settings"
          ansible.platform.settings:
            settings:
              SESSION_COOKIE_AGE: "{{ new_value }}"
            <<: *aap_conn
          check_mode: true
          register: current

        - name: "Capture original value"
          ansible.builtin.set_fact:
            original_value: "{{ current.settings.old_values[test_setting] }}"

        - name: "[TC-1640-2-21-1] Update SESSION_COOKIE_AGE to {{ new_value }}"
          ansible.platform.settings:
            settings:
              SESSION_COOKIE_AGE: "{{ new_value }}"
            <<: *aap_conn
          register: upd
          when: original_value | string != new_value | string

        - name: "[TC-1640-2-21-1] Skip update — value already {{ new_value }}"
          ansible.builtin.debug:
            msg: "SESSION_COOKIE_AGE is already {{ new_value }}, skipping update"
          when: original_value | string == new_value | string

        - name: Assert changed and old/new values reported
          ansible.builtin.assert:
            that:
              - upd is changed
              - upd.settings.old_values[test_setting] | string == original_value | string
              - upd.settings.new_values[test_setting] | string == new_value | string
            fail_msg: "Settings update failed or old/new values missing in result"
          when: original_value | string != new_value | string

        - name: "[TC-1640-2-21-1] Idempotency — same value again"
          ansible.platform.settings:
            settings:
              SESSION_COOKIE_AGE: "{{ new_value }}"
            <<: *aap_conn
          register: idem
        - ansible.builtin.assert:
            that: idem is not changed
            fail_msg: "Settings re-run with same value not idempotent"

        - ansible.builtin.debug:
            msg: "TC-1640-2-21-1 PASSED"

      rescue:
        - ansible.builtin.fail:
            msg: "TC-1640-2-21-1 FAILED"

      always:
        - name: "[cleanup] Restore SESSION_COOKIE_AGE to original value"
          ansible.platform.settings:
            settings:
              SESSION_COOKIE_AGE: "{{ original_value | default(1800) }}"
            <<: *aap_conn
          register: _r
          failed_when: _r.failed
...
